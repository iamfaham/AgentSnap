name: live-validation

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Optional: forward to run_all.py --only (leave blank to run everything)"
        required: false
        type: string
  schedule:
    - cron: "0 6 1 * *"

jobs:
  live:
    if: github.event_name == 'workflow_dispatch' || vars.RUN_SCHEDULED_LIVE_TESTS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev,all-providers]"

      - name: Run real-API example matrix
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AGENTSNAP_JUDGE_API_KEY: ${{ secrets.AGENTSNAP_JUDGE_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.only }}" ]; then
            python examples/run_all.py --real --only "${{ github.event.inputs.only }}"
          else
            python examples/run_all.py --real
          fi
