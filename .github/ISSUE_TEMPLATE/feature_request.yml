name: Feature request
description: Suggest an idea or improvement for agentsnap
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem before jumping to the solution — it helps us evaluate whether there's a simpler fix.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's painful or missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like agentsnap to do instead? Include example API/CLI usage if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches, workarounds, or existing tools you've considered, and why they fall short.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else relevant — links, related issues, screenshots.
    validations:
      required: false
